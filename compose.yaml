# ===========================================
# PocketBase Docker — compose.yaml example
# https://github.com/narra-antonio/pocketbase-docker
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env with your values
#   3. docker compose up -d
#
# For all available environment variables see:
#   docs/envs.md
# ===========================================

services:
  pocketbase:
    image: tonynarra/pocketbase-docker:latest
    # Uncomment to use a specific variant:
    # image: tonynarra/pocketbase-docker:1.0.0-alpine
    # image: tonynarra/pocketbase-docker:1.0.0-trixie
    # image: tonynarra/pocketbase-docker:1.0.0-ubi9-minimal
    container_name: pocketbase
    restart: unless-stopped

    # Default port is 8090 — if you change PB_PORT in .env
    # update both sides of the mapping accordingly
    ports:
      - "${PB_PORT:-8090}:${PB_PORT:-8090}"

    volumes:
      # Required — persistent data (database, storage, backups)
      - ./pb_data:/pb_data

      # Optional — user migrations
      # - ./pb_migrations:/pb_migrations

      # Optional — JS hooks
      # - ./pb_hooks:/pb_hooks

      # Optional — static files served by PocketBase
      # - ./pb_public:/pb_public

      # Optional — custom email templates
      # See docs/templates.md for details
      # - ./pb_templates:/pb_templates

    env_file:
      - .env

    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:${PB_PORT:-8090}/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s